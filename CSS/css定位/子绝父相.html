<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .father{
      /* 给他设置一个定位 */
      position: relative;
      /* position: absolute; */
      /* 子绝父绝也可以 */

      width: 600px;
      height: 600px;
      background-color: pink;

    }

    .son{
      /* 绝对定位 */
      position: absolute;
      right: 0;
      bottom: 0;

      width: 400px;
      height: 400px;
      background-color: blue;
    }

    .red{
      width: 800px;
      height: 400px;
      background-color: red;
      /* 如果父元素是绝对定位（不占位置），红盒子会往上跑；但是相对定位还是占位置的； */
    }
  </style>
</head>
<body>
    <div class="father">
      <div class="son"></div>
    </div>
    <div class="red"></div>
</body>
</html>
