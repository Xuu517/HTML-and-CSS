<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      margin: 0;
      padding: 0;
    }

    div{
      width: 300px;
      height: 300px;
    }

    .blue{
      background-color: blue;

    }

    .red{
      background-color: red;
    }

    .green{
      position:relative;
      top:100px;
      left: 100px;
      background-color: green;
    }
  </style>
</head>
<body>
  <div class="red"></div>
  <div class="green"></div>
  <div class="blue"></div>
  
</body>
</html>
