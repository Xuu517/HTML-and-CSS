<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .father{
      width: 300px;
      height: 300px;
      background-color: skyblue;
    }

    .father::after{
      /* 必加的属性 */
      content: "我是一个伪元素";
      /* 需要加样式设置才能设置宽高，因为伪元素是行内元素不能设置 */
      display: block;
      width: 100px;
      height: 100px;
      background-color: white;

      
    }
  </style>
</head>
<body>
  <div class="father">我是fathe内部内容</div>
  
</body>
</html>
