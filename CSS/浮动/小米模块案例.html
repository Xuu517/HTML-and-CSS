<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      margin: 0;
      padding: 0;
    }

    .box{
      width: 1226px;
      height: 614px;
      margin: auto;
    }

    .left{
      float:left;
      width: 234px;
      height: 614px;
      background-color: #800080;
    }

    .right{
      float: right;
      width: 978px;
      height: 614px;
      /* background-color: yellow; */
    }

    .item{
      float: left;
      width: 234px;
      height: 300px;
      background-color: #87ceed;
      margin-right:14px;
      margin-bottom: 14px;
      /* 右边不需要margin，会使整个布局变形 */
      /* 找到第四个和第八个方块 */
     
    }

    .item:nth-child(4n){
        /* background-color: red;为了确定找到的是不是第四个和第八个 */
        
        margin: 0;
      }

    .item:nth-child(n+5){
      margin-bottom: 0;
    }

  </style>
</head>
<body>
  <div class="box">
    <div class="left"></div>
    <div class="right">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      
    </div>
  </div>
  
</body>
</html>
