<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      margin: 0;
      padding: 0;
    }

    div{
      /* float: left; */
      width:200px;
      height:200px;
     
    }
    .red{
      background-color: red;
      display: inline-block;
     
    }
    .green{
      background-color: green;
      /* 1.右浮动 */
      float: right;
      /* 蓝色盒子往上跑 */
      /* 2.左浮动 */
     
    }
    .blue{
      background-color: blue;
      height:210px;
      width: 210px;
     
    }
       span{
      width: 200px;
      height: 200px;
      background-color: orange;
     /* 浮动完之后可以设置宽高，因为浮动可以使他脱标 */
     float: left;
    } 
  </style>
</head>
<body>
  <div class="red"></div>
  <div class="green"></div>
  <div class="blue"></div>
  <span>我是一个span标签</span>
  <span>我是一个span标签</span>
  <span>我是一个span标签</span>
</body>
</html>
