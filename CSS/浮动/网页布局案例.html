<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 去除默认标签的margin padding */
    *{
      margin: 0;
      padding: 0;
    }

    .header{
      height: 40px;
      background-color: #333;
    }

    .nav{
      width: 1226px;
      height: 100px;
      background-color: #ffc0cb;
      margin: auto;
      /* 使盒子居中显示 */
    }

    .banner{
      width: 1226px;
      height: 460px;
      background-color: yellow;
      margin: auto;
    }

    .left{
      width: 234px;
      height:460px;
      background-color: #ffa500;
      float:left;
    }

    .right{
      width: 992px;
      height: 460px;
      background-color: #87ceeb;
      /* 默认蓝盒子在橙色下方最左边，因为块元素默认从上往下垂直布局 ,块元素独占一行*/
      float: right;
    }
  </style>
</head>
<body>
  <!-- 布局流程从上往下，从内向外 -->
  <!-- 网页的头部 -->
  <div class="header"></div>
  <!-- 网页的导航 -->
  <div class="nav"></div>
  <!-- 网页的轮播图 -->
  <div class="banner">
    <div class="left"></div>
    <div class="right"></div>
  </div>
</body>
</html>
