<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      margin: 0;
      padding: 0;
    }
    .box{
      /*div不设置宽度默认占满一行*/
      height: 40px;
      
      border-top:3px solid #ff8500;
      border-bottom:1px solid #edeef0;
    }
      /*一般选择后代选择器*/
    .box a{
      /*a标签行内元素，不能设置宽高，可以将它转换为行内快元素*/
      height:40px;
      /*设置大小并不能解决问题，通过设置内边距来设置内容间的距离*/
      /*width:80px;*/
      padding: 0px 20px;
      display:inline-block ;
     
      /*块之间好多间隙，减少标签间的换行，后续可用浮动解决*/
      color: #4c4c4c;
      text-decoration: none;
      text-align: center;
      line-height: 40px;
      font-size:12px;
    }
    .box a:hover{
      background-color: #edeef0;
      color:#ff8400;
    }
  </style>
</head>
<body>
  <div class="box">
    <a href="">新浪导航</a><a href="">新浪导航新浪导航新浪导航新浪导航新浪导航新浪导航</a><a href="">新浪导航</a><a href="">新浪导航</a>
  </div>
  
</body>
</html>
