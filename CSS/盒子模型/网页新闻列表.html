<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      margin: 0;
      padding: 0;
     
    }
    /*设置行高和文字大小一致*/
    body{
      line-height: 1;
    }
  .box{
    width:500px;
    height:400px;
    border: 1px solid #ccc;
    padding: 41px 30px 0;
    box-sizing: border-box;
  }
  .box h2{
    height:41px;
   
    border-bottom: 1px solid #ccc;
    box-sizing: border-box;
    font-size: 30px;
  }
  .box ul{
list-style: none;

  }
  .box ul li{
    height:50px;
    padding-left: 30px;
    border-bottom: 1px dashed #ccc;
    line-height: 50px;
  }
  .box li a{
    text-decoration: none;
    color:#666;
  }

  
</style>
</head>
<body>
  <div class="box">
    <h2>最新文章/New Articles</h2>
    <ul>
      <li><a href="">月色</a></li>
      <li><a href="">血色</a></li>
      <li><a href="">之间</a></li>
      <li><a href="">你是</a></li>
      <li><a href="">绝色</a></li>
    </ul>


  </div>
  
</body>
</html>
