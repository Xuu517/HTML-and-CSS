<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /*行内元素不能设置宽高，可直接转换成行内块元素*/
    a{
      width: 80px;
      height: 50px;
      background-color: red;
      display:inline-block;
      text-decoration:none;
      /*文字颜色*/
      color:#fff;
      text-align:center;
      /*让文字垂直居中，块的高度*/
      line-height:50px;
    }

    a:hover{
      background-color: #ffa500;
    }
  </style>

</head>
<body>
  <a href="#">导航1</a>
  <a href="#">导航2</a>
  <a href="#">导航3</a>
  <a href="#">导航4</a>
  <a href="#">导航5</a>
  
</body>
</html>
