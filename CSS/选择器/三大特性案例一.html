<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /*0,2,0,0*/
    #father #son{
      color:skyblue;
    }
    /*0,1,1,1*/
    #father p.c2{
      color:red;
    }
/*不能直接选中p标签，继承--》pass*/
    #father{
      color:green !important;
    }
    /*pass*/
  #father.c1{
    color:yellow;

  }
  </style>
</head>
<body>
  <div id="father" class="c1">
    <p id="son" class="c2">
      这行文本是什么颜色？
    </p>
  </div>
  
</body>
</html>
