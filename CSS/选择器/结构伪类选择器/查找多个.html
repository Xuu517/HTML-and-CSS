<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 1.找到偶数个li */
    li:nth-child(2n){
      background-color: skyblue;
    }
    /* 2.找到基数个li */
    li:nth-child(2n+1){
      background-color: BLUE;
    }
    /* 找到前五个 */
    li:nth-child(-n+5){
      /* -n必须写在前面，不然浏览器解析失败 */
      background-color: orange;
    }
    /* 第五个往后 */
    li:nth-child(n+5){
      background-color: #fff;
    }
  </style>
</head>
<body>
  <ul>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>  
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
  </ul>
  
</body>
</html>
